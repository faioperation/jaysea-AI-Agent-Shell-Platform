# =============================================================================
# docker-compose.yml
# Jaysea AI-Agent Shell Platform - Production Deployment
# =============================================================================
# Services:
#   db         - PostgreSQL 16 database
#   redis      - Redis 7 cache (OTP, sessions)
#   backend    - Node.js + Express + Prisma API
#   ai-service - Python FastAPI + OpenAI + Pinecone
#   frontend   - Next.js web app
#   nginx      - Reverse proxy (routes all traffic)
# =============================================================================

version: "3.9"

networks:
  jaysea-network:
    driver: bridge
    name: jaysea-network

volumes:
  postgres_data:
    name: jaysea_postgres_data
  redis_data:
    name: jaysea_redis_data
  uploads_data:
    name: jaysea_uploads_data

services:

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: jaysea_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-jaysea}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-jaysea_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jaysea-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jaysea} -d ${DB_NAME:-jaysea_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: jaysea_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - jaysea-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ===========================================================================
  # Node.js Backend (Express + Prisma + PostgreSQL)
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jaysea/backend:latest
    container_name: jaysea_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8001
      DATABASE_URL: postgresql://${DB_USER:-jaysea}:${DB_PASSWORD}@db:5432/${DB_NAME:-jaysea_db}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      JWT_SECRET_TOKEN: ${JWT_SECRET_TOKEN}
      JWT_REFRESH_TOKEN: ${JWT_REFRESH_TOKEN}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      AI_URL: http://ai-service:8002
      BACKEND_URL: ${BACKEND_URL:-http://localhost}
      FRONT_END_URL: ${FRONT_END_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - jaysea-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ===========================================================================
  # Python AI Service (FastAPI + OpenAI + Pinecone)
  # ===========================================================================
  ai-service:
    build:
      context: ./ai-codebase
      dockerfile: Dockerfile
    image: jaysea/ai-service:latest
    container_name: jaysea_ai
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-ai-agent-memory}
      BACKEND_API_URL: http://backend:8001
    networks:
      - jaysea-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ===========================================================================
  # Next.js Frontend
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    image: jaysea/frontend:latest
    container_name: jaysea_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    networks:
      - jaysea-network
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: jaysea_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for SSL with Let's Encrypt:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - /var/www/certbot:/var/www/certbot:ro
    networks:
      - jaysea-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
